<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal do Motorista - Smart Claims</title>

    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.fe.templates, sap.ui.core"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-frameOptions="allow"
        data-sap-ui-resourceroots='{ "milksales.smartclaims.motorista": "./" }'>
    </script>

    <script>
        sap.ui.require([
            "sap/ui/core/ComponentContainer"
        ], function(ComponentContainer) {
            new ComponentContainer({
                name: "milksales.smartclaims.motorista",
                settings: {},
                async: true,
                height: "100%",
                width: "100%"
            }).placeAt("content");
        });
    </script>

    <!-- WebMCP (Voice Integration) for Senior Driver Experience -->
    <script>
        async function setupSeniorMCP() {
            let ctx = navigator.modelContext;
            let retries = 0;
            while (!ctx && retries < 10) {
                await new Promise(r => setTimeout(r, 500));
                ctx = navigator.modelContext;
                retries++;
            }
            if (!ctx) return;
            
            ctx.registerTool({
                name: 'criarNovaAvaria',
                description: 'Cria rapidamente um rascunho de avaria informando o cliente e o motorista.',
                parameters: {
                    type: 'object',
                    properties: {
                        cliente: { type: 'string' },
                        motorista: { type: 'string' }
                    },
                    required: ['cliente']
                },
                execute: async (args) => {
                    const res = await fetch('/odata/v4/driver/Claims', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            customerName: args.cliente,
                            driverName: args.motorista || 'Motorista Logado',
                            status: 'PENDING',
                            deliveryDate: new Date().toISOString().split('T')[0]
                        })
                    });
                    const data = await res.json();
                    return `Avaria criada com sucesso para ${args.cliente}. ID: ${data.ID}. Recarregue a lista para ver o rascunho.`;
                }
            });
        }
        window.addEventListener('load', setupSeniorMCP);
    </script>

    <style>
        html, body, #content {
            height: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="sapUiBody" id="content"></body>
</html>
